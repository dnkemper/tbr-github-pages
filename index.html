<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
    --bg: #08081a;
    --surface: #10102a;
    --surface2: #0e0e20;
    --border: #20204a;
    --violet: #7a6ae0;
    --violet-light: #9888f0;
    --gold: #e0c060;
    --gold-dim: #9a8a4a;
    --text: #d0d0e8;
    --text-dim: #d0d0e8;
    --text-faint: #7878a0;
    --green: #50b088;
    --amber: #c4943a;
}

body{background:var(--bg);color:var(--text);font-family:'Nunito',system-ui,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}

.noise{position:fixed;top:0;left:0;width:100%;height:100%;opacity:.025;pointer-events:none;z-index:999;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E")}

header{padding:2rem 1.5rem 1rem;text-align:center;position:relative;overflow:hidden}
header::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 40% 90%,rgba(122,106,224,.1) 0%,transparent 50%),radial-gradient(ellipse at 65% 70%,rgba(224,192,96,.04) 0%,transparent 40%);pointer-events:none}
h1{font-family:'Cormorant Garamond',Georgia,serif;font-weight:700;font-size:2.4rem;letter-spacing:-.02em;color:var(--text);line-height:1.1;margin-bottom:.25rem}
h1 span{color:var(--violet-light);font-style:italic}
.subtitle{color:var(--text-dim);font-size:.85rem;font-weight:300;letter-spacing:.04em}
.stats-row{display:flex;justify-content:center;gap:1.5rem;margin-top:1rem;flex-wrap:wrap}
.stat{text-align:center}
.stat-num{font-family:'Cormorant Garamond',Georgia,serif;font-size:1.8rem;font-weight:700;color:var(--gold)}
.stat-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-dim)}

.controls{padding:.75rem 1rem;position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.search-wrap{position:relative;margin-bottom:.6rem}
.search-wrap svg{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);color:var(--text-dim);width:16px;height:16px}
input[type="text"]{width:100%;padding:.6rem .75rem .6rem 2.25rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Nunito',system-ui,sans-serif;font-size:.85rem;outline:none;transition:border-color .2s}
input[type="text"]:focus{border-color:var(--violet)}
input::placeholder{color:var(--text-faint)}

.filter-section{margin-bottom:.5rem}
.filters{display:flex;gap:.4rem;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;padding-bottom:2px}
.filters::-webkit-scrollbar{display:none}
.filter-btn{padding:.35rem .7rem;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text-dim);font-size:.7rem;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .2s;font-family:'Nunito',system-ui,sans-serif}
.filter-btn:hover,.filter-btn.active{background:var(--violet);border-color:var(--violet);color:#fff}
.genre-filters .filter-btn.active{background:transparent;border-color:var(--gold-dim);color:var(--gold)}

.sort-row{display:flex;gap:.4rem;margin-top:.5rem;align-items:center}
.sort-label{font-size:.65rem;color:var(--text-faint);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap}
.sort-btn{padding:.3rem .6rem;background:transparent;border:1px solid var(--border);border-radius:5px;color:var(--text-dim);font-size:.65rem;cursor:pointer;font-family:'Nunito',system-ui,sans-serif;transition:all .2s}
.sort-btn:hover,.sort-btn.active{border-color:var(--gold-dim);color:var(--gold)}

.book-list{padding:.5rem 1rem 6rem}
.book-count{font-size:.7rem;color:var(--text-faint);text-align:center;padding:.5rem 0;letter-spacing:.05em}

.book{display:grid;grid-template-columns:2.2rem 1fr auto;gap:.6rem;align-items:start;padding:.7rem 0;border-bottom:1px solid var(--border);animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.book-rank{font-family:'Cormorant Garamond',Georgia,serif;font-size:1.1rem;font-weight:700;color:var(--text-faint);text-align:center;padding-top:.1rem}
.book-rank.top10{color:var(--gold)}
.book-rank.top50{color:var(--gold-dim)}
.book-info{min-width:0}
.book-title{font-family:'Cormorant Garamond',Georgia,serif;font-size:1rem;font-weight:600;line-height:1.25;color:var(--text);margin-bottom:.15rem}
.book-title .series{color:var(--text-dim);font-weight:400;font-style:italic;font-size:.85rem}
.book-author{font-size:.75rem;color:var(--violet-light);font-weight:400;margin-bottom:.3rem}
.book-meta{display:flex;gap:.4rem;flex-wrap:wrap;align-items:center}
.tag{font-size:.6rem;padding:.15rem .4rem;border-radius:4px;font-weight:500;letter-spacing:.03em;line-height:1.3}
.tag-pages{background:rgba(224,192,96,.08);color:var(--gold-dim)}
.tag-audio-yes{background:rgba(80,176,136,.1);color:var(--green)}
.tag-audio-check{background:rgba(196,148,58,.08);color:var(--amber)}
.tag-audio-none{background:var(--surface);color:var(--text-faint)}
.tag-format{background:var(--surface);color:var(--text-faint)}

/* Genre colors — tuned for dark navy bg */
.genre-dark-romance{background:rgba(200,50,80,.12);color:#d06080}
.genre-mafia-romance{background:rgba(200,50,50,.12);color:#c86060}
.genre-fantasy-romance{background:rgba(120,90,220,.14);color:#a898f0}
.genre-paranormal-romance{background:rgba(100,70,200,.12);color:#9080d0}
.genre-reverse-harem{background:rgba(200,80,180,.1);color:#d080c0}
.genre-dark-academy{background:rgba(60,70,120,.18);color:#8090c0}
.genre-contemporary-romance{background:rgba(220,160,80,.08);color:#d0b070}
.genre-sports-romance{background:rgba(60,160,100,.1);color:#60c088}
.genre-mc-romance{background:rgba(140,110,70,.12);color:#b8a070}
.genre-urban-fantasy{background:rgba(60,140,200,.1);color:#60b0d8}
.genre-fantasy{background:rgba(90,90,200,.12);color:#9090d8}
.genre-epic-fantasy{background:rgba(70,110,200,.14);color:#7098d8}
.genre-ya-fantasy{background:rgba(130,90,220,.1);color:#a888e0}
.genre-ya{background:rgba(120,120,200,.1);color:#9090c8}
.genre-paranormal{background:rgba(100,60,160,.12);color:#8870b8}
.genre-sci-fi-romance{background:rgba(40,180,180,.08);color:#50c0c0}
.genre-omegaverse{background:rgba(200,70,120,.1);color:#d06898}
.genre-thriller{background:rgba(200,200,50,.08);color:#b8b848}
.genre-dystopian{background:rgba(160,160,60,.1);color:#a8a858}
.genre-historical-romance{background:rgba(180,140,70,.1);color:#c8a860}
.genre-romance{background:rgba(170,120,150,.08);color:#b890a8}
.genre-romantic-suspense{background:rgba(180,160,50,.08);color:#b8a840}
.genre-gothic{background:rgba(100,50,100,.14);color:#a068a8}
.genre-dark{background:rgba(120,50,50,.14);color:#a86868}
.genre-ya-mystery{background:rgba(160,140,60,.1);color:#a89858}
.genre-ya-thriller{background:rgba(180,180,50,.08);color:#b0b048}
.genre-sci-fi{background:rgba(40,160,160,.08);color:#50b0b0}

.book-rating{text-align:right;padding-top:.15rem}
.rating-num{font-family:'Cormorant Garamond',Georgia,serif;font-size:1.3rem;font-weight:700}
.rating-high{color:var(--gold)}
.rating-mid{color:var(--violet-light)}
.rating-low{color:var(--text-dim)}
.rating-bar{width:2.5rem;height:3px;background:var(--surface2);border-radius:2px;margin-top:.2rem;margin-left:auto;overflow:hidden}
.rating-fill{height:100%;border-radius:2px;transition:width .5s ease}

.empty-state{text-align:center;padding:3rem 1rem;color:var(--text-faint)}
.empty-state svg{margin-bottom:.5rem;opacity:.4}

.back-top{position:fixed;bottom:1.5rem;right:1.5rem;width:2.5rem;height:2.5rem;background:var(--violet);border:none;border-radius:50%;color:#fff;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(122,106,224,.4);z-index:50;transition:transform .2s}
.back-top:hover{transform:scale(1.1)}
.back-top.visible{display:flex}

@media(min-width:640px){
  header{padding:3rem 2rem 1.5rem}
  h1{font-size:3rem}
  .controls{padding:1rem 2rem}
  .book-list{padding:1rem 2rem 4rem;max-width:800px;margin:0 auto}
  .book{grid-template-columns:2.5rem 1fr auto;gap:1rem;padding:.85rem 0}
}
</style>
</head>

let currentFilter = 'all';
let currentGenre = null;
let currentSort = 'rating';
let searchTerm = '';

function extractSeries(title) {
  const m = title.match(/\((.+?)\)\s*$/);
  if (m) return { clean: title.replace(m[0], '').trim(), series: m[1] };
  return { clean: title, series: null };
}

function ratingClass(r) {
  if (r >= 4.4) return 'rating-high';
  if (r >= 4.2) return 'rating-mid';
  return 'rating-low';
}

function ratingColor(r) {
  if (r >= 4.4) return 'var(--gold)';
  if (r >= 4.2) return 'var(--violet-light)';
  return 'var(--text-dim)';
}

function genreClass(genre) {
  return 'genre-' + genre.toLowerCase().replace(/[\s\/]+/g, '-').replace(/[^a-z-]/g, '');
}

function genreTags(genres) {
  return genres.map(g => `<span class="tag ${genreClass(g)}">${g}</span>`).join('');
}

function audioTag(status) {
  if (status === 'Yes') return '<span class="tag tag-audio-yes">🎧 Yes</span>';
  if (status === 'Check') return '<span class="tag tag-audio-check">🎧 Check</span>';
  return '';
}

function renderBooks(books) {
  const container = document.getElementById('bookContainer');
  const countEl = document.getElementById('bookCount');

  if (books.length === 0) {
    container.innerHTML = '<div class="empty-state"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg><div>No books match your filters</div></div>';
    countEl.textContent = 'No results';
    return;
  }

  countEl.textContent = `Showing ${books.length} book${books.length !== 1 ? 's' : ''}`;

  const html = books.map((b, i) => {
    const { clean, series } = extractSeries(b.title);
    const rankClass = b.rank <= 10 ? 'top10' : b.rank <= 50 ? 'top50' : '';
    const pct = ((b.rating - 3.5) / 1.5) * 100;

    return `<div class="book">
      <div class="book-rank ${rankClass}">${b.rank}</div>
      <div class="book-info">
        <div class="book-title">${clean}${series ? ` <span class="series">${series}</span>` : ''}</div>
        <div class="book-author">${b.author}</div>
        <div class="book-meta">
          ${genreTags(b.genres)}
          ${b.pages ? `<span class="tag tag-pages">${b.pages}pg</span>` : ''}
          ${audioTag(b.audiobook)}
          <span class="tag tag-format">${b.binding}</span>
        </div>
      </div>
      <div class="book-rating">
        <div class="rating-num ${ratingClass(b.rating)}">${b.rating.toFixed(2)}</div>
        <div class="rating-bar"><div class="rating-fill" style="width:${Math.min(100,Math.max(5,pct))}%;background:${ratingColor(b.rating)}"></div></div>
      </div>
    </div>`;
  }).join('');

  container.innerHTML = html;
}

function applyFilters() {
  let filtered = [...BOOKS];
  const s = searchTerm.toLowerCase();

  if (s) filtered = filtered.filter(b =>
    b.title.toLowerCase().includes(s) ||
    b.author.toLowerCase().includes(s) ||
    b.genres.some(g => g.toLowerCase().includes(s))
  );

  if (currentGenre) {
    filtered = filtered.filter(b => b.genres.includes(currentGenre));
  }

  switch(currentFilter) {
    case 'top50': filtered = filtered.filter(b => b.rank <= 50); break;
    case 'top100': filtered = filtered.filter(b => b.rank <= 100); break;
    case 'audio': filtered = filtered.filter(b => b.audiobook === 'Yes'); break;
    case 'r45': filtered = filtered.filter(b => b.rating >= 4.5); break;
    case 'r43': filtered = filtered.filter(b => b.rating >= 4.3); break;
    case 'short': filtered = filtered.filter(b => b.pages > 0 && b.pages < 350); break;
  }

  switch(currentSort) {
    case 'rating': filtered.sort((a,b) => b.rating - a.rating); break;
    case 'title': filtered.sort((a,b) => a.title.localeCompare(b.title)); break;
    case 'author': filtered.sort((a,b) => a.author.localeCompare(b.author)); break;
    case 'pages': filtered.sort((a,b) => (b.pages||0) - (a.pages||0)); break;
    case 'added': filtered.sort((a,b) => b.date_added.localeCompare(a.date_added)); break;
  }

  renderBooks(filtered);
}

document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value;
  applyFilters();
});

document.getElementById('filters').addEventListener('click', e => {
  if (!e.target.classList.contains('filter-btn')) return;
  document.querySelectorAll('#filters .filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  currentFilter = e.target.dataset.filter;
  applyFilters();
});

document.getElementById('genreFilters').addEventListener('click', e => {
  if (!e.target.classList.contains('filter-btn')) return;
  const wasActive = e.target.classList.contains('active');
  document.querySelectorAll('#genreFilters .filter-btn').forEach(b => b.classList.remove('active'));
  if (!wasActive) {
    e.target.classList.add('active');
    currentGenre = e.target.dataset.genre;
  } else {
    currentGenre = null;
  }
  applyFilters();
});

document.querySelector('.sort-row').addEventListener('click', e => {
  if (!e.target.classList.contains('sort-btn')) return;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  currentSort = e.target.dataset.sort;
  applyFilters();
});

window.addEventListener('scroll', () => {
  document.getElementById('backTop').classList.toggle('visible', window.scrollY > 600);
});

renderBooks(BOOKS);
</script>
